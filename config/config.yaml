# config.yaml - Configuration file for pastForward
# This file contains settings for various stages of the pipeline


project_name: "pastForward_Project"

# Pipeline stages and their configurations
pipeline:

  # Global settings
  global:
    # When true, existing output files will be skipped to avoid re-computation (Default: true)
    skip_existing_files: true

  # Stages of the pipeline

  # Raw reads processing
  # Includes quality checking, adapter removal, quality filtering, merging, 
  # contamination analysis, and statistical analysis
  raw_reads_processing:
    # When true, this stage will be executed. (Default: true)
    execute: true

    # Adapter removal from raw reads
    adapter_removal:
      # When true, this sub-stage will be executed (Default: true)
      execute: true

      # Settings for adapter removal
      settings: 
        # Minimum quality score for adapter removal
        min_quality: 0
        # Minimum length of reads after adapter removal
        min_length: 0
        # Optional: Adapter sequences for read 1 and read 2
        # If not provided, fastp will try to identify adapters automatically
        #adapters_sequences:
          # Adapter sequence for read 1
          #r1: "AGATCGGAAGAGCACACGTCTGAACTCCAGTCA"
          # Adapter sequence for read 2
          #r2: "AGATCGGAAGAGCGTCGTGTAGGGAAAGAGTGT" 
        # Optional: Extra parameters for adapter removal (Default: "")
        #extra_params: ""
    
    # Quality filtering of trimmed reads
    quality_filtering:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      settings:
        # Minimum quality score for quality filtering
        min_quality: 15
        # Minimum length of reads after quality filtering
        min_length: 30

    # Contamination analysis
    contamination_analysis:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      tools:
        # ECMSD tool settings for contamination analysis
        ecmsd:
          # When true, this tool will be executed (Default: true)
          execute: true
          settings:
            # Optional: Path to the ECMSD database folder.
            # If not provided, the database will be auto-created via ECMSD --create-db
            #database: "resources/ecmsd_database"
            # Reference genome bin size for coverage calculation (Default: 1000)
            binsize: 1000
            # Minimum Relative Mapping Uniqueness Score — taxa below this are filtered out (Default: 0.15)
            rmus_threshold: 0.15
            # Minimum mapping quality score to include a read in analysis (Default: 20)
            mapping_quality: 20
            # Taxonomic level for aggregating results. Options: "species", "genus", "family", "order" (Default: "species")
            taxonomic_hierarchy: "species"
        # Centrifuge tool settings for contamination analysis
        centrifuge:
          # When true, this tool will be executed (Default: true)
          execute: true
          settings:
            # Optional: When true, human will be included in the Centrifuge analysis (Default: false)
            include_human_taxid: true
            # Optional: Path to the conda environment for Centrifuge
            # If not provided, the default environment will be used
            #conda_env: "../../../../envs/centrifuge.yaml"
            # Path to the Centrifuge index. If not provided, the default index will be downloaded and used
            # index: "/path/to/centrifuge_index"
    
    # Sub-stages with their respective settings
    # Quality analysis (FastQC + MultiQC at each processing stage)
    analysis:
      # When true, quality checking will run (Default: true)
      execute: true
      settings:
        # Run FastQC/MultiQC on raw reads (Default: true)
        multiqc_raw_reads: true
        # Run FastQC/MultiQC on adapter-trimmed reads (Default: true)
        multiqc_trimmed_reads: true
        # Run FastQC/MultiQC on quality-filtered reads (Default: true)
        multiqc_quality_filtered_reads: true
        # Run FastQC/MultiQC on merged per-individual reads (Default: true)
        multiqc_merged_reads: true
        # When true, generate read count bar plots (Default: true)
        create_plots: true

  # Reference processing
  reference_processing:
    # When true, this stage will be executed (Default: true)
    execute: true

    mapping:
      settings:
        # Options: "bwa-aln", "bwa-mem2" (default), or "minimap2"
        # bwa-aln: classic seed-and-extend, well-suited for short aDNA reads
        # bwa-mem2: faster modern reimplementation of bwa-mem
        # minimap2: fast versatile aligner, uses preset "-ax sr" for short reads
        mapper: "bwa-mem2"
        # Optional: extra parameters passed directly to the mapper
        # For bwa-aln, defaults to "-n 0.01 -k 2 -l 1024 -o 2" (Oliva et al. 2021, 10.1093/bib/bbab076)
        # For minimap2, defaults to "-ax sr"
        #mapper_extra_params: ""

    # Deduplication settings
    deduplication:
      # When true, this sub-stage will be executed (Default: true)
      execute: false
      settings:
        # To increase performance, deduplication will be done per cluster of contigs
        # Below settings define how the contigs will be clustered
        # Optional: Maximum number of contigs per cluster (Default: 10 if not specified)
        max_contigs_per_cluster: 10
        # Optional: Maximum number of contigs per cluster (Default: 500 if not specified)
        max_contigs_per_cluster: 500
    
    # Damage rescaling settings for mapDamage2
    damage_rescaling:
      # When true, this sub-stage will be executed (Default: true)
      execute: true

    filter_unmapped_reads:
      # When true, unmapped reads will be processed according to action (Default: false)
      execute: false
      settings:
        # What to do with unmapped reads. Choose one of:
        #   "keep"          — retain unmapped reads in the final BAM (default — must be changed explicitly)
        #   "remove"        — write a mapped-reads-only BAM  ({individual}_{reference}_mapped_only.bam)
        #   "extract_fastq" — write unmapped reads to a compressed FASTQ ({individual}_{reference}_unmapped.fastq.gz)
        #   "extract_fasta" — write unmapped reads to a compressed FASTA ({individual}_{reference}_unmapped.fasta.gz)
        action: "keep"

    # BAM analysis settings (coverage, Qualimap, Preseq, damage, endogenous reads)
    analysis:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      settings:
        # Run mapDamage2 damage visualisation and statistics (Default: true)
        damage_analysis: true
        # When true, generate coverage and endogenous reads plots (Default: true)
        create_plots: true
        # When true, generate a per-individual MultiQC BAM report (Default: true)
        individual_multiqc: true
        # When true, generate a per-reference MultiQC report across all individuals (Default: true)
        species_multiqc: true
        # When true, include Preseq c_curve in MultiQC reports (Default: true)
        c_curve: true
        # When true, include Qualimap in MultiQC reports (Default: true)
        qualimap: true
        # When true, include samtools stats in MultiQC reports (Default: true)
        samtools_stats: true


  dynamics:
    # When true, this stage will be executed (Default: true)
    execute: true
    mapping:
      settings:
        # Options: "bwa-mem2" (default), "bwa-aln" or "minimap2"
        # bwa-aln: classic seed-and-extend, well-suited for short aDNA reads
        # bwa-mem2: faster modern reimplementation of bwa-mem
        # minimap2: fast versatile aligner, uses preset "-ax sr" for short reads
        mapper: "bwa-mem2"
        # Optional: extra parameters passed directly to the mapper
        # For bwa-aln, defaults to "-n 0.01 -k 2 -l 1024 -o 2" (Oliva et al. 2021, 10.1093/bib/bbab076)
        #mapper_extra_params: ""
    seqvista:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      settings:
        # Controls plotting for individual-level seqvista output.
        # Options:
        #   "plot"          — generate plotables AND render plots (Default)
        #   "plotable_only" — generate plotables only, skip rendering plots
        #   "skip"          — skip both plotables and plots
        individual_plots: "plot"
        # Controls plotting for species-level (comparison) seqvista output.
        # Options:
        #   "plot"          — generate plotables AND render the facet comparison plot (Default)
        #   "plotable_only" — generate plotables only, skip rendering the comparison plot
        #   "skip"          — skip both plotables and the comparison plot
        comparison_plots: "plot"
  
  summary_processing:
    # When true, this stage will be executed (Default: true)
    execute: true
    settings:
      # When true, generate a per-individual MultiQC summary report (Default: true)
      individual_multiqc: true
      # When true, generate a per-species MultiQC summary report (Default: true)
      species_multiqc: true

# Species-specific settings
species:
  # Settings for the demo species
  demo:
    # Name of the species
    name: "Dmel Demo"