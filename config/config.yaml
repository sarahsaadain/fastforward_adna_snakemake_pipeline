# config_demo.yaml - Minimum configuration for pastForward
#
# Only project_name and at least one species entry are required.
# All pipeline stages run with their defaults when not specified.
#
# For a full list of settings and an interactive editor, open config_designer.html in a browser.

project_name: "pastForward_Project"

# Species settings
# The key (e.g. "Dmel") must match the species folder name in the pipeline root directory.
species:
  Dmel:
    name: "Drosophila melanogaster"

    # Required only when using the Dynamics stage with SCG auto-determination
    # (i.e. no pre-built SCG FASTA is placed in {species}/raw/dynamics/scg/).
    # Find available lineages at https://busco.ezlab.org/
    scg_selector:
      settings:
        lineage: "drosophilidae_odb12"

    # Optional: limit which individuals to process (all discovered by default)
    #individuals:
    #  - IND001
    #  - IND002

    # Optional: limit which reference genomes to use (all discovered by default)
    # IDs are filename stems with dots replaced by underscores (e.g. genome.fna → genome)
    #references:
    #  - genome

    # Optional: limit which feature libraries to use (all discovered by default)
    #feature_libraries:
    #  - my_lib

# To add more species, duplicate the block above:
# species:
#   Dmel:
#     name: "Drosophila melanogaster"
#     scg_selector:
#       settings:
#         lineage: "drosophilidae_odb12"
#   Equus:
#     name: "Equus caballus"
#     scg_selector:
#       settings:
#         lineage: "equidae_odb10"
