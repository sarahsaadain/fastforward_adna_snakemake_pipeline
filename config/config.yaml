# config.yaml - Configuration file for pastForward
# This file contains settings for various stages of the pipeline


project_name: "pastForward_Project"

# Pipeline stages and their configurations
pipeline:

  # Global settings
  global:
    # When true, existing output files will be skipped to avoid re-computation (Default: true)
    skip_existing_files: true

  # Stages of the pipeline

  # Raw reads processing
  # Includes quality checking, adapter removal, quality filtering, merging, 
  # contamination analysis, and statistical analysis
  raw_reads_processing:
    # When true, this stage will be executed. (Default: true)
    execute: true

    # Adapter removal from raw reads
    adapter_removal:
      # When true, this sub-stage will be executed (Default: true)
      execute: true

      # Settings for adapter removal
      settings: 
        # Minimum quality score for adapter removal
        min_quality: 0
        # Minimum length of reads after adapter removal
        min_length: 0
        # Optional: Adapter sequences for read 1 and read 2
        # If not provided, fastp will try to identify adapters automatically
        #adapters_sequences:
          # Adapter sequence for read 1
          #r1: "AGATCGGAAGAGCACACGTCTGAACTCCAGTCA"
          # Adapter sequence for read 2
          #r2: "AGATCGGAAGAGCGTCGTGTAGGGAAAGAGTGT" 
        # Optional: Extra parameters for adapter removal (Default: "")
        #extra_params: ""
    
    # Quality filtering of trimmed reads
    quality_filtering:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      settings:
        # Minimum quality score for quality filtering
        min_quality: 15
        # Minimum length of reads after quality filtering
        min_length: 30

    # Contamination analysis
    contamination_analysis:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      tools:
        # ECMSD tool settings for contamination analysis
        ecmsd:
          # When true, this tool will be executed (Default: true)
          execute: true
          settings:
            # Optional: Path to the ECMSD database folder.
            # If not provided, the database will be auto-created via ECMSD --create-db
            #database: "resources/ecmsd_database"
            # Minimum % of reference covered by reads to retain it (Default: 50)
            cov_threshold: 50
            # Number of top references to generate alignment plots for (Default: 25)
            top_n: 25
            # Minimum mapping quality score to include a read in analysis (Default: 20)
            mapping_quality: 20
            # Taxonomic level for aggregating results. Options: "species", "genus", "family", "order" (Default: "species")
            taxonomic_hierarchy: "species"
        # Centrifuge tool settings for contamination analysis
        centrifuge:
          # When true, this tool will be executed (Default: true)
          execute: true
          settings:
            # Optional: When true, human will be included in the Centrifuge analysis (Default: false)
            include_human_taxid: true
            # Optional: Path to the conda environment for Centrifuge
            # If not provided, the default environment will be used
            #conda_env: "../../../../envs/centrifuge.yaml"
            # Path to the Centrifuge index. If not provided, the default index will be downloaded and used
            # index: "/path/to/centrifuge_index"
    
    # Sub-stages with their respective settings
    # Quality analysis (FastQC + MultiQC at each processing stage)
    analysis:
      # When true, quality checking will run (Default: true)
      execute: true
      settings:
        # Run FastQC/MultiQC on raw reads (Default: true)
        multiqc_raw_reads: true
        # Run FastQC/MultiQC on adapter-trimmed reads (Default: true)
        multiqc_trimmed_reads: true
        # Run FastQC/MultiQC on quality-filtered reads (Default: true)
        multiqc_quality_filtered_reads: true
        # Run FastQC/MultiQC on merged per-individual reads (Default: true)
        multiqc_merged_reads: true
        # When true, generate read count bar plots (Default: true)
        create_plots: true

  # Reference processing
  reference_processing:
    # When true, this stage will be executed (Default: true)
    execute: true

    mapping:
      settings:
        # Options: "bwa-aln", "bwa-mem2" (default), or "minimap2"
        # bwa-aln: classic seed-and-extend, well-suited for short aDNA reads
        # bwa-mem2: faster modern reimplementation of bwa-mem
        # minimap2: fast versatile aligner, uses preset "-ax sr" for short reads
        mapper: "bwa-mem2"
        # Optional: extra parameters passed directly to the mapper
        # For bwa-aln, defaults to "-n 0.01 -k 2 -l 1024 -o 2" (Oliva et al. 2021, 10.1093/bib/bbab076)
        # For minimap2, defaults to "-ax sr"
        #mapper_extra_params: ""

    # Deduplication settings
    deduplication:
      # When true, this sub-stage will be executed (Default: true)
      execute: false
      settings:
        # To increase performance, deduplication will be done per cluster of contigs
        # Below settings define how the contigs will be clustered
        # Optional: Maximum number of contigs per cluster (Default: 10 if not specified)
        max_contigs_per_cluster: 10
        # Optional: Maximum number of contigs per cluster (Default: 500 if not specified)
        max_contigs_per_cluster: 500
    
    # Damage rescaling settings for mapDamage2
    damage_rescaling:
      # When true, this sub-stage will be executed (Default: true)
      execute: true

    filter_unmapped_reads:
      # When true, unmapped reads will be processed according to action (Default: false)
      execute: false
      settings:
        # What to do with unmapped reads. Choose one of:
        #   "keep"          — retain unmapped reads in the final BAM (default — must be changed explicitly)
        #   "remove"        — write a mapped-reads-only BAM  ({individual}_{reference}_mapped_only.bam)
        #   "extract_fastq" — write unmapped reads to a compressed FASTQ ({individual}_{reference}_unmapped.fastq.gz)
        #   "extract_fasta" — write unmapped reads to a compressed FASTA ({individual}_{reference}_unmapped.fasta.gz)
        action: "keep"

    # BAM analysis settings (coverage, Qualimap, Preseq, damage, endogenous reads)
    analysis:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      settings:
        # Run mapDamage2 damage visualisation and statistics (Default: true)
        damage_analysis: true
        # When true, generate coverage and endogenous reads plots (Default: true)
        create_plots: true
        # When true, generate a per-individual MultiQC BAM report (Default: true)
        individual_multiqc: true
        # When true, generate a per-reference MultiQC report across all individuals (Default: true)
        species_multiqc: true
        # When true, include Preseq c_curve in MultiQC reports (Default: true)
        c_curve: true
        # When true, include Qualimap in MultiQC reports (Default: true)
        qualimap: true
        # When true, include samtools stats in MultiQC reports (Default: true)
        samtools_stats: true


  dynamics:
    # When true, this stage will be executed (Default: true)
    execute: true
    mapping:
      settings:
        # Options: "bwa-mem2" (default), "bwa-aln" or "minimap2"
        # bwa-aln: classic seed-and-extend, well-suited for short aDNA reads
        # bwa-mem2: faster modern reimplementation of bwa-mem
        # minimap2: fast versatile aligner, uses preset "-ax sr" for short reads
        mapper: "bwa-mem2"
        # Optional: extra parameters passed directly to the mapper
        # For bwa-aln, defaults to "-n 0.01 -k 2 -l 1024 -o 2" (Oliva et al. 2021, 10.1093/bib/bbab076)
        #mapper_extra_params: ""
        # When true, the filtered sorted BAM (and its index) produced by the dynamics mapping step
        # are kept as permanent outputs in {species}/processed/dynamics/{feature_library}/mapped/.
        # When false (default), they are marked as temporary and deleted after SeqVista consumes them.
        # Set to true to inspect the BAM or to run the mapping step independently of SeqVista.
        keep_mapped_bam: false
        # When true, competitive mapping is enabled: sequences from {species}/raw/dynamics/competition/
        # are combined with the SCG and feature library before mapping. Competition sequences are
        # suffixed with _comp, and reads mapping to them are removed after mapping — only SCG and
        # feature library sequences are retained for downstream analysis. (Default: false)
        competitive_mapping: false
        # Minimum mapping quality score applied to SCG sequences (_scg) in the combined library.
        # Reads mapping to SCG references with MAPQ below this value are removed after mapping.
        # Set to 0 to disable.
        min_mapq_scg: 0
        # Minimum mapping quality score applied to feature library sequences (_fle) in the combined library.
        # Reads mapping to feature references with MAPQ below this value are removed after mapping.
        # SCG reads (_scg) are not affected. Set to 0 (default) to disable.
        min_mapq_fle: 0

    # ── SCG Selector ──────────────────────────────────────────────────────────
    # Automatically determines single-copy genes (SCGs) via BUSCO when no SCG
    # FASTA is provided in {species}/raw/dynamics/scg/.
    # If a FASTA is already present there, this section is ignored and the
    # user-provided file is used instead.
    # Setting execute: true also enables an "SCG-only" run (ranking output is
    # produced even when no feature libraries are present).
    scg_selector:
      # When true, run SCG determination if no user-provided SCG file exists (Default: true)
      # Automatically skipped when a user-provided SCG FASTA is found in
      # {species}/raw/dynamics/scg/ or when no lineage is configured for the species.
      execute: true
      settings:
        # Mapper for SCG library mapping. Defaults to pipeline.dynamics.mapping.settings.mapper.
        # Uncomment to override. Options: "bwa-mem2", "bwa-aln", "minimap2"
        #mapper: "minimap2"
        # Extra parameters passed directly to the mapper.
        # Defaults to pipeline.dynamics.mapping.settings.mapper_extra_params if set,
        # otherwise falls back to mapper-specific defaults (bwa-aln: Oliva et al. 2021, minimap2: "-ax sr").
        #mapper_extra_params: ""
        # Number of top-ranked SCGs to keep (Default: 20; per-species setting takes precedence if set)
        num_top_scgs: 20
        # Minimum SCG sequence length in bp to include (Default: 4000)
        min_length_scg: 4000
        # Maximum SCG sequence length in bp to include (Default: 8000)
        max_length_scg: 8000
        # Minimum mapping quality score for reads mapped to the SCG library.
        # Reads with MAPQ below this value are removed from the BAM after unmapped-read removal.
        # Also used as the threshold when computing per-contig coverage stats. Set to 0 to disable.
        min_mapq: 15
        # When true, the filtered sorted SCG BAM and its index are kept as permanent outputs in
        # {species}/processed/dynamics/scg/reads_mapped/. When false (default), they are
        # marked as temporary and deleted after SCG ranking consumes them.
        keep_mapped_bam: false

    seqvista:
      # When true, this sub-stage will be executed (Default: true)
      execute: true
      settings:
        # Controls plotting for individual-level seqvista output.
        # Options:
        #   "plot"          — generate plotables AND render plots (Default)
        #   "plotable_only" — generate plotables only, skip rendering plots
        #   "skip"          — skip both plotables and plots
        individual_plots: "plot"
        # Controls plotting for species-level (comparison) seqvista output.
        # Options:
        #   "plot"          — generate plotables AND render the facet comparison plot (Default)
        #   "plotable_only" — generate plotables only, skip rendering the comparison plot
        #   "skip"          — skip both plotables and the comparison plot
        comparison_plots: "plot"
        # Y-axis value above which the plot switches to log scale (individual and species level) (Default: 25)
        y_axis_log_scale_threshold_individual: 25
        y_axis_log_scale_threshold_species: 25
        # bam2so: mapping quality threshold; reads below this are considered ambiguous (Default: 5)
        mapping_quality_threshold: 5
        # bam2so: minimum count of SNPs to call a SNP (Default: 5)
        minimum_count_snp: 5
        # bam2so: minimum frequency of SNPs to call a SNP (Default: 0.1)
        minimum_frequency_snp: 0.1
        # bam2so: minimum count of indels to call an indel (Default: 3)
        minimum_count_indel: 3
        # bam2so: minimum frequency of indels to call an indel (Default: 0.01)
        minimum_frequency_indel: 0.01
        # normalize-so: distance from sequence ends excluded from normalization (Default: 100)
        end_distance: 100
        # normalize-so: exclude the most extreme coverage quantiles for normalization (Default: 25)
        exclude_quantile: 25
  
  summary_processing:
    # When true, this stage will be executed (Default: true)
    execute: true
    settings:
      # When true, generate a per-individual MultiQC summary report (Default: true)
      individual_multiqc: true
      # When true, generate a per-species MultiQC summary report (Default: true)
      species_multiqc: true

# Species-specific settings
species:
  # Settings for the demo species
  demo:
    # Whether to process this species (Default: true).
    # Set to false to skip all pipeline stages for this species without removing it from the config.
    execute: true

    # Name of the species
    name: "Dmel Demo"

    # Optional: restrict which individuals to process for this species.
    # If omitted, all individuals discovered in {species}/raw/reads/ are used.
    # Each entry must match the individual ID extracted from read filenames
    # (the part before the first "_", e.g. "IND001" from "IND001_L001_R1.fastq.gz").
    # An error is raised if any listed ID is not found on disk.
    #individuals:
    #  - IND001
    #  - IND002

    # Optional: restrict which reference genomes to use for this species.
    # If omitted, all references discovered in {species}/raw/ref/ are used.
    # Each entry must match the reference ID derived from the filename:
    # basename without extension, dots replaced by underscores
    # (e.g. "genome.fna" → "genome", "EquCab3.0.fna" → "EquCab3_0").
    # An error is raised if any listed ID is not found on disk.
    #references:
    #  - genome

    # Optional: restrict which feature libraries to use for this species.
    # If omitted, all libraries discovered in {species}/raw/dynamics/feature_library/ are used.
    # Each entry must match the library ID derived from the filename:
    # basename without extension, dots replaced by underscores
    # (e.g. "genes.fna" → "genes", "my.lib.fna" → "my_lib").
    # An error is raised if any listed ID is not found on disk.
    #feature_libraries:
    #  - genes

    # Per-species SCG selector settings (only relevant when
    # pipeline.dynamics.scg_selector.execute is true AND no user-provided SCG
    # file exists in {species}/raw/dynamics/scg/).
    scg_selector:
      # Optional: exact path to the reference genome to use for SCG determination.
      # Required when multiple FASTA files exist in {species}/raw/ref/.
      # If omitted and exactly one reference is present, it is used automatically
      # and an info message is written to the log.
      #reference: "/path/to/reference.fasta"

      settings:
        # BUSCO lineage database name (required for SCG determination).
        # Find available lineages at https://busco.ezlab.org/
        # Example: "drosophilidae_odb12", "diptera_odb10", "insecta_odb10"
        lineage: "drosophilidae_odb12"
        # Number of top-ranked SCGs to keep (Default: 20)
        num_top_scgs: 20
        # Minimum SCG sequence length in bp to include (Default: 4000)
        min_length_scg: 4000
        # Maximum SCG sequence length in bp to include (Default: 8000)
        max_length_scg: 8000